name: Daily Ticket Scraper

on:
  schedule:
    - cron: '40 16 * * *'  # Runs every day at 10:40am MT (UTC-6)
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore notification state cache
        uses: actions/cache/restore@v4
        with:
          path: notified_events.json
          key: notified-events-${{ github.ref }}-${{ github.run_id }}
          restore-keys: |
            notified-events-${{ github.ref }}-
            notified-events-

      - name: Show cached notification state
        run: cat notified_events.json || echo "No cache file found"

      - name: Run the scraper
        env:
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAILS: ${{ secrets.NOTIFY_EMAILS }}
        working-directory: src
        run: python scraper.py

      - name: Save notification state cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: notified_events.json
          key: notified-events-${{ github.ref }}-${{ github.run_id }}